spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: doctors-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/doctors/**

            - id: patients-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/patients/**

            - id: billing-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/billing/**

            - id: appointments-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/appointments/**

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: doctors-services
        url: http://localhost:8081/v3/api-docs

      - name: patients-services
        url: http://localhost:8082/v3/api-docs

      - name: billing-services
        url: http://localhost:8083/v3/api-docs

      - name: appointments-services
        url: http://localhost:8084/v3/api-docs

